    <style>
      /* ── 초기 로딩 화면 스타일 (인라인 — Tailwind/JS 번들 로드 전에 적용) ──
         [v3.7.62] Tailwind 클래스에서 인라인 스타일로 전환.
         기존: class="bg-[#1e1e1e]" → JS 로드 전에는 흰 배경 플래시 발생.
         수정: 모든 스타일을 <style>에 직접 기술 → 페이지 로드 즉시 다크 배경 표시. */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100%;
        background: #1e1e1e;
        color: #cccccc;
        font-family: 'Segoe UI', -apple-system, sans-serif;
        overflow: hidden;
      }
      #root {
        width: 100%; height: 100%;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #1e1e1e;
      }

      /* 로딩 스피너 */
      .vibe-loader {
        display: flex; flex-direction: column;
        align-items: center; gap: 20px;
      }
      .vibe-logo {
        width: 64px; height: 64px;
        animation: pulse-neon 1.8s infinite ease-in-out;
      }
      .vibe-label {
        font-size: 11px; font-weight: 600;
        letter-spacing: 3px; color: #7c3aed;
        text-transform: uppercase;
      }
      .vibe-bar-wrap {
        width: 160px; height: 2px;
        background: #2a2a3a; border-radius: 2px; overflow: hidden;
      }
      .vibe-bar {
        height: 100%; width: 40%;
        background: linear-gradient(90deg, transparent, #7c3aed, transparent);
        animation: slide 1.2s infinite linear;
        border-radius: 2px;
      }

      @keyframes pulse-neon {
        0%, 100% { opacity: 0.5; filter: drop-shadow(0 0 6px #7c3aed); }
        50%       { opacity: 1;   filter: drop-shadow(0 0 18px #7c3aed); }
      }
      @keyframes slide {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
    </style>
